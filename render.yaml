services:
  - type: web
    name: temporal-write
    runtime: node
    plan: free # Can be updated to starter/pro for more RAM
    region: oregon # Defaulting to US West (Oregon)
    buildCommand: npm install && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: OPENROUTER_API_KEY
        sync: false # User must set this in Render Dashboard
      - key: GROQ_API_KEY
        sync: false # User must set this in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # User must set this in Render Dashboard
    autoDeploy: true
